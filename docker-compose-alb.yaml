services:
  # main 서비스 (Nginx)
  service-docker-main:
    image: csjin21c/nginx:1.29.7-docker-main
    container_name: docker-main-nginx-container
    restart: always
    ports:
      - "80:80"
    networks:
      - board-network

  # docker-install (Nginx)
  service-docker-install:
    image: csjin21c/nginx:1.29.7-docker-install
    container_name: docker-install-nginx-container
    restart: always
    ports:
      - "8080:80"
    networks:
      - board-network

  # docker-command (Nginx)
  service-docker-command:
    image: csjin21c/nginx:1.29.7-docker-command
    container_name: docker-command-nginx-container
    restart: always
    ports:
      - "8081:80"
    networks:
      - board-network

  # docker-build (Nginx)
  service-docker-build:
    image: csjin21c/nginx:1.29.7-docker-build
    container_name: docker-build-nginx-container
    restart: always
    ports:
      - "8082:80"
    networks:
      - board-network

  # docker-compose (Nginx)
  service-docker-compose:
    image: csjin21c/nginx:1.29.7-docker-compose
    container_name: docker-compose-nginx-container
    restart: always
    ports:
      - "8083:80"
    networks:
      - board-network

  # docker-swarm (Nginx)
  service-docker-swarm:
    image: csjin21c/nginx:1.29.7-docker-swarm
    container_name: docker-swarm-nginx-container
    restart: always
    ports:
      - "8084:80"
    networks:
      - board-network

  # kubernetes: docker-fastapi
  service-docker-fastapi:
    image: csjin21c/fastapi:alb-path
    container_name: kubernetes-fastapi-alb-path-container
    restart: always
    ports:
      - "8085:8000"
    networks:
      - board-network

  # 1. Database 서비스 (MySQL)
  service-board-mysql:
    image: csjin21c/mysql:8.4-board
    build:
      context: ./mysql # MySQL 관련 파일(Dockerfile, init.sql 등)이 있는 경로
      dockerfile: Dockerfile
      platforms: ["linux/amd64", "linux/arm64"]
    container_name: mysql-primary-container
    restart: unless-stopped # always(도커 엔진이 시작되면 컨테이너 재시작), unless-stopped(임의 정지시킨 컨테이너는 재시작에서 제외)
    environment:
      MYSQL_ROOT_PASSWORD: "ian1234!"
      MYSQL_DATABASE: "iandb"
      MYSQL_USER: "ian"
      MYSQL_PASSWORD: "ian1234!"
      TZ: "Asia/Seoul"
    ports:
      - "3306:3306"
    networks:
      - board-network

  # 2. Application 서비스 (FastAPI)
  service-board-fastapi:
    image: csjin21c/fastapi:board-proxy
    container_name: board-fastapi-container
    restart: always
    depends_on:
      - service-board-mysql
    environment:
      # 코드 내 DB_INFO["host"]를 'my-service-db'로 설정해야 합니다.
      DB_HOST: "mysql-primary-container"
      DB_USER: "dev"
      DB_PASSWORD: "dev1234!"
      DB_NAME: "iandb"
    ports:
      - "8000:8000"
    networks:
      - board-network

  # 3. Web 서비스 (Nginx)
  service-board-nginx:
    image: csjin21c/nginx:1.29.7-board-proxy
    container_name: board-nginx-container
    restart: always
    depends_on:
      - service-board-fastapi
    ports:
      - "8086:80"
    networks:
      - board-network
      
      
networks:
  board-network:
    driver: bridge
